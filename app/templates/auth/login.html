{% extends 'base.html' %}
{% block title %}Login – Cleanfix AI{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.auth-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 1rem;
  padding: 2rem 1.5rem; width: 100%; max-width: 420px;
  box-shadow: 0 25px 50px rgba(0,0,0,.4);
}
@media (min-width: 480px) { .auth-card { padding: 2.5rem; } }
.auth-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
.auth-sub   { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
.form-group { margin-bottom: 1.25rem; }
label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: .05em; }
input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 0.5rem; padding: 0.85rem 1rem; color: var(--text);
  font-size: 1rem; /* ≥16px: prevents iOS Safari auto-zoom on focus */
  font-family: inherit; transition: border-color .2s;
  -webkit-appearance: none; /* removes iOS rounded corners */
}
input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.15); }
.btn-block { width: 100%; justify-content: center; padding: 0.85rem; font-size: 1rem; min-height: 48px; }
.auth-footer { margin-top: 1.5rem; text-align: center; color: var(--muted); font-size: 0.875rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome back 👋</div>
    <div class="auth-sub">Sign in to your Cleanfix AI account</div>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <div class="auth-footer">
      <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a> &nbsp;·&nbsp;
      Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
    </div>
  </div>
</div>
{% endblock %}
