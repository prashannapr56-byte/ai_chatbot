{% extends 'base.html' %}
{% block title %}Reset Password – Cleanfix AI{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 420px; }
.auth-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
.auth-sub   { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.form-group { margin-bottom: 1.25rem; }
label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: .05em; }
input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.75rem 1rem; color: var(--text); font-size: 0.95rem; font-family: inherit; transition: border-color .2s; }
input:focus { outline: none; border-color: var(--accent); }
.btn-block { width: 100%; justify-content: center; padding: 0.75rem; font-size: 1rem; }
.hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Reset Password 🔒</div>
    <div class="auth-sub">Enter your new password below</div>
    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <p class="hint">Min 8 chars · Uppercase · Lowercase · Number · Special character</p>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
