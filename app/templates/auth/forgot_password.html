{% extends 'base.html' %}
{% block title %}Forgot Password – Cloud AI Chatbot{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 420px; }
.auth-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
.auth-sub   { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.form-group { margin-bottom: 1.25rem; }
label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: .05em; }
input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.75rem 1rem; color: var(--text); font-size: 0.95rem; font-family: inherit; transition: border-color .2s; }
input:focus { outline: none; border-color: var(--accent); }
.btn-block { width: 100%; justify-content: center; padding: 0.75rem; font-size: 1rem; }
.auth-footer { margin-top: 1.5rem; text-align: center; color: var(--muted); font-size: 0.875rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Forgot Password 🔐</div>
    <div class="auth-sub">Enter your email and we'll send you a reset link</div>
    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <div class="auth-footer"><a href="{{ url_for('auth.login') }}">← Back to login</a></div>
  </div>
</div>
{% endblock %}
