{% extends 'base.html' %}
{% block title %}Chats – Cleanfix AI{% endblock %}
{% block extra_css %}
<style>
.chat-layout {
  display: flex; gap: 0;
  height: calc(100dvh - var(--nav-h));
  margin: -1.5rem -1rem; overflow: hidden;
}
@media (min-width: 640px) { .chat-layout { margin: -2rem; } }

.sidebar {
  width: 280px; min-width: 280px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform 0.3s ease; z-index: 200;
}
.sidebar-header { padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-title { font-weight: 700; font-size: 1rem; }
.chat-list { flex: 1; overflow-y: auto; padding: 0.5rem; -webkit-overflow-scrolling: touch; }
.chat-item-wrapper { position: relative; margin-bottom: 2px; display: flex; align-items: center; }
.chat-item {
  flex: 1; padding: 0.85rem 2.75rem 0.85rem 1rem;
  border-radius: 0.5rem; cursor: pointer; display: block;
  color: var(--muted); font-size: 0.875rem;
  transition: all .2s; text-decoration: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-item:hover { background: var(--surface2); color: var(--text); text-decoration: none; }
.chat-item.active { background: rgba(108,99,255,.2); color: var(--accent2); }
.sidebar-delete-btn {
  position: absolute; right: 0.5rem;
  background: transparent; border: none; color: #5a607a; cursor: pointer;
  padding: 0.4rem; border-radius: 0.35rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; min-width: 32px; min-height: 32px;
  opacity: 0;
}
@media (hover: none) { .sidebar-delete-btn { opacity: 0.5; } }
.chat-item-wrapper:hover .sidebar-delete-btn { opacity: 1; }
.sidebar-delete-btn:hover { background: rgba(239,68,68,.15); color: var(--error); }

/* Mobile overlay */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 199;
  backdrop-filter: blur(2px);
}
@media (max-width: 640px) {
  .sidebar {
    position: fixed; left: 0; top: var(--nav-h); bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
}

.main-panel { flex: 1; display: flex; flex-direction: column; }
.empty-panel { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: var(--muted); }
.empty-panel .icon { font-size: 4rem; }
.empty-panel p { font-size: 1.1rem; }

/* Mobile open-sidebar button inside main panel */
.open-sidebar-btn {
  display: none;
  position: absolute; top: 1rem; left: 1rem;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; padding: 0.5rem;
  border-radius: 0.5rem; z-index: 10;
  min-width: 40px; min-height: 40px; align-items: center; justify-content: center;
}
@media (max-width: 640px) { .open-sidebar-btn { display: flex; } }
</style>
{% endblock %}
{% block content %}
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="chat-layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">💬 Chats</span>
      <form action="{{ url_for('chat.new_chat') }}" method="POST">
        <button type="submit" class="btn btn-primary" style="padding: 0.35rem 0.75rem; font-size: 0.8rem;">+ New</button>
      </form>
    </div>
    <div class="chat-list">
      {% for chat in chats %}
      <div class="chat-item-wrapper">
        <a href="{{ url_for('chat.view', chat_id=chat.id) }}" class="chat-item">{{ chat.title }}</a>
        <form action="{{ url_for('chat.delete_chat', chat_id=chat.id) }}" method="POST" onsubmit="return confirm('Delete this chat?')" style="margin:0; display:inline;">
          <button type="submit" class="sidebar-delete-btn" title="Delete Chat">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </form>
      </div>
      {% else %}
      <div style="padding: 1rem; color: var(--muted); font-size: 0.8rem; text-align: center;">No chats yet</div>
      {% endfor %}
    </div>
  </div>
  <div class="main-panel" style="position:relative;">
    <button class="open-sidebar-btn" onclick="openSidebar()" aria-label="Open chats">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="empty-panel">
      <div class="icon">🤖</div>
      <p>Select a chat or start a new one</p>
    </div>
  </div>
</div>
<script>
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
</script>
{% endblock %}
