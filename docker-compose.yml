version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: always

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ai_chatbot
      MYSQL_USER: chatbot_user
      MYSQL_PASSWORD: secure-password-here
      MYSQL_ROOT_PASSWORD: root-secret-password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot-secret-password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
